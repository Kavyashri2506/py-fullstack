<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shopping App - Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;
}

/* Login Page */
#loginPage {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(to right, #6a11cb, #2575fc);
}

.login-box {
    background: white;
    padding: 25px;
    border-radius: 10px;
    text-align: center;
    width: 280px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px;
}

button {
    padding: 10px;
    background: #2575fc;
    color: white;
    border: none;
    cursor: pointer;
}

/* Shopping Page */
#shopPage {
    display: none;
}

header {
    background: #2575fc;
    color: white;
    padding: 15px;
    text-align: center;
}

.products {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.product {
    background: white;
    padding: 15px;
    margin: 15px;
    border-radius: 10px;
    width: 180px;
    text-align: center;
    box-shadow: 0px 0px 5px gray;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginPage">
    <div class="login-box">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button onclick="login()">Login</button>
        <p id="message"></p>
    </div>
</div>

<!-- 🛍️ SHOP -->
<div id="shopPage">
    <header>
        <h2>🛍️ Shopping App</h2>
        <button onclick="logout()">Logout</button>
    </header>

    <div class="products">
        <div class="product">
            <h3>Shoes</h3>
            <p>₹999</p>
            <button onclick="buy('Shoes')">Buy</button>
        </div>

        <div class="product">
            <h3>Watch</h3>
            <p>₹1499</p>
            <button onclick="buy('Watch')">Buy</button>
        </div>

        <div class="product">
            <h3>Bag</h3>
            <p>₹799</p>
            <button onclick="buy('Bag')">Buy</button>
        </div>
    </div>
</div>

<script>
// Login function
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "admin" && pass === "1234") {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("shopPage").style.display = "block";
    } else {
        document.getElementById("message").innerText = "Invalid Login!";
    }
}

// Logout
function logout() {
    document.getElementById("shopPage").style.display = "none";
    document.getElementById("loginPage").style.display = "flex";
}

// Buy function
function buy(item) {
    alert("You bought " + item);
}
</script>

</body>
</html>
